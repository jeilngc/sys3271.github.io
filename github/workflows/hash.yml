name: Auto-hash CSS and JS files

on:
  push:
    branches: [main, master]

jobs:
  hash:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run hash build script
        run: node build.js
      
      - name: Commit hashed files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto-hash: update file versions [skip ci]"
          git push
